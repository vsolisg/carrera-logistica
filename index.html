<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚚</text></svg>">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
  width:100%; height:100vh; overflow:hidden; 
  background:#03050a; 
  display: flex; justify-content: center; align-items: center;
}
#game-wrapper {
  position: relative;
  width: 960px; height: 600px;
  box-shadow: 0 0 40px rgba(0, 255, 255, 0.15); 
  border: 1px solid #1a2b4c;
  border-radius: 12px;
  overflow: hidden;
}
canvas { display:block; background:#0A0E1A; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(10,14,26,0.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  font-family:'Courier New',monospace; color:#fff; z-index:10;
}
#overlay h1 { color:#00ffff; font-size:26px; text-align:center; text-shadow: 0 0 10px #00ffff; }
#overlay p { color:#ccc; font-size:13px; text-align:center; max-width:480px; line-height:1.7; }
.ctrl { display:flex; gap:20px; margin-top: 10px; }
.cbox { border:1px solid #333; padding:12px 24px; text-align:center; font-size:13px; border-radius: 6px; }
.c1 { color:#00ffff; border-color:#00ffff88; background: rgba(0,255,255,0.05); }
.c2 { color:#ff6600; border-color:#ff660088; background: rgba(255,102,0,0.05); }
#startBtn {
  margin-top:15px; padding:12px 36px; background:transparent;
  border:2px solid #00ffff; color:#00ffff; border-radius: 4px;
  font-family:'Courier New',monospace; font-size:16px; font-weight: bold;
  cursor:pointer; transition:all 0.2s;
}
#startBtn:hover { background:#00ffff; color:#0A0E1A; box-shadow: 0 0 15px #00ffff; }
.stages-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin: 10px 0; }
.spill { font-size:11px; border:1px solid #444; padding:5px 10px; color:#aaa; border-radius: 4px; background: #111; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="c" width="960" height="600"></canvas>
  <div id="overlay">
    <h1>🏁 CD RACING 🏁</h1>
    <p>Completa las 5 etapas del centro de distribución. Evita pallets y contenedores. ¡El primero en terminar optimizará el Fill Rate y hará al cliente feliz!</p>
    <div class="stages-row">
      <div class="spill">📦 Recepción</div>
      <div class="spill">🏭 Almacenamiento</div>
      <div class="spill">📡 Picking </div>
      <div class="spill">📫 Packing</div>
      <div class="spill">🚚 Última Milla</div>
    </div>
    <div class="ctrl">
      <div class="cbox c1"><b>JUGADOR 1</b><br><br>W / S</div>
      <div class="cbox c2"><b>JUGADOR 2</b><br><br>↑ / ↓</div>
    </div>
    <button id="startBtn">INICIAR TURNO</button>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 960, H = 600;

var STAGES = [
  {name:'Recepción',    color:'#00ffff', lc:'#00ffff33', role:'truck'},
  {name:'Almacenamiento',color:'#ff00ff', lc:'#ff00ff33', role:'forklift'},
  {name:'Picking', color:'#39ff14', lc:'#39ff1433', role:'rfid'},
  {name:'Packing',      color:'#ffaa00', lc:'#ffaa0033', role:'packer'},
  {name:'Última Milla', color:'#ff4466', lc:'#ff446633', role:'moto'},
];
var STAGE_DIST = 4000;
var WIN_DIST = STAGE_DIST * STAGES.length;
var P1_LANES = [80, 170, 260];
var P2_LANES = [350, 440, 530];
var MID_Y = 310;

var keys = {};
var p1, p2, obs1, obs2, spawnT, winner, gT, custAnim, running;
var particles = [], banners = [];

document.getElementById('startBtn').addEventListener('click', function() {
  document.getElementById('overlay').style.display = 'none';
  startGame();
});

function startGame() {
  p1 = makePlayer('JUGADOR 1','#00ffff', P1_LANES, 130);
  p2 = makePlayer('JUGADOR 2','#ff6600', P2_LANES, 130);
  obs1=[]; obs2=[]; particles=[]; banners=[]; 
  spawnT=1.2; winner=null; gT=0; custAnim=0; running=true;
  requestAnimationFrame(loop);
}

function makePlayer(id, color, lanes, x) {
  return {
    id:id, color:color, lanes:lanes, x:x,
    li:1, y:lanes[1], ty:lanes[1],
    dist:0, speed:460, maxSpeed:460, accel:260,
    stunned:false, stunT:0, rot:0, flash:0,
    lastStage: 0,
    get stage(){ return Math.min(Math.floor(this.dist/STAGE_DIST), STAGES.length-1); },
    get role(){ return STAGES[this.stage].role; }
  };
}

function changeLane(p, d) {
  if (!p.stunned) { p.li = Math.max(0, Math.min(2, p.li+d)); p.ty = p.lanes[p.li]; }
}

function crash(p) {
  if (!p.stunned) { p.stunned=true; p.stunT=1.4; p.speed=60; p.rot=0; p.flash=1; }
}

function spawnStageVFX(x, y, stageDef, laneY) {
  for(var i=0; i<40; i++) {
    particles.push({
      x: x, y: y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
      life: 1.0, color: stageDef.color
    });
  }
  banners.push({ text: "¡" + stageDef.name.toUpperCase() + "!", y: laneY, color: stageDef.color, life: 2.5, scale: 0.1 });
}

function updateDrawVFX(dt) {
  for(var i=particles.length-1; i>=0; i--) {
    var pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.life -= dt * 1.5;
    if(pt.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, 6, 6);
  }
  ctx.globalAlpha = 1;

  for(var j=banners.length-1; j>=0; j--) {
    var b = banners[j];
    b.life -= dt;
    if(b.life <= 0) { banners.splice(j, 1); continue; }
    b.scale = Math.min(1.2, b.scale + dt * 8); 
    if(b.scale > 1.0 && b.life < 2.3) b.scale = 1.0; 
    ctx.save(); ctx.translate(W/2, b.y); ctx.scale(b.scale, b.scale);
    ctx.globalAlpha = Math.min(1, b.life * 2); 
    ctx.fillStyle = b.color; ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = b.color; ctx.shadowBlur = 20;
    ctx.fillText(b.text, 0, 0); ctx.restore();
  }
}

function updatePlayer(p, dt) {
  p.dist += p.speed * dt;
  var currentStage = p.stage;
  if (currentStage !== p.lastStage && currentStage < STAGES.length) {
    spawnStageVFX(p.x, p.y, STAGES[currentStage], p.lanes[1]);
    p.lastStage = currentStage;
  }
  if (p.stunned) {
    p.stunT -= dt; p.rot += 260*dt;
    if (p.stunT <= 0) { p.stunned=false; p.rot=0; }
  } else {
    if (p.speed < p.maxSpeed) { p.speed += p.accel*dt; if (p.speed>p.maxSpeed) p.speed=p.maxSpeed; }
  }
  p.y += (p.ty - p.y) * 12 * dt;
  p.flash = Math.max(0, p.flash - dt*3);
}

/* ------- SPRITES: VEHÍCULOS Y PERSONAJES ------- */

function drawWheel(x, y) {
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
}

function drawTruck(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); roundRect(-34, -10, 68, 20, 4); ctx.fill();
  var grd = ctx.createLinearGradient(-36, 0, 10, 0);
  grd.addColorStop(0, '#222'); grd.addColorStop(1, col);
  ctx.fillStyle = grd; ctx.beginPath(); roundRect(-36, -15, 52, 28, 4); ctx.fill();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(18, -13, 20, 24, 4); ctx.fill();
  ctx.fillStyle = '#8ce'; ctx.beginPath(); roundRect(24, -10, 10, 18, 2); ctx.fill(); 
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 5;
  ctx.fillRect(36, -11, 2, 4); ctx.fillRect(36, 5, 2, 4); ctx.shadowBlur = 0;
  drawWheel(-24, -16); drawWheel(-24, 14); drawWheel(-8, -16);  drawWheel(-8, 14); drawWheel(26, -16);  drawWheel(26, 14);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-10, 13); ctx.stroke();
  ctx.restore();
}

function drawForklift(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  drawWheel(-16, 12); drawWheel(10, 12);
  ctx.fillStyle = '#333'; ctx.beginPath(); roundRect(-24, -10, 12, 20, 3); ctx.fill();
  var grd = ctx.createLinearGradient(-12, -10, 14, 10);
  grd.addColorStop(0, col); grd.addColorStop(1, '#ffaa00');
  ctx.fillStyle = grd; ctx.beginPath(); roundRect(-14, -8, 28, 18, 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-10, -8); ctx.lineTo(-12, -26); ctx.lineTo(6, -26); ctx.lineTo(10, -8); ctx.stroke();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-6, -18, 10, 12, 2); ctx.fill(); 
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-1, -22, 5, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#444'; ctx.fillRect(14, -24, 4, 36);
  ctx.fillStyle = '#999'; ctx.fillRect(18, 10, 16, 3);
  ctx.restore();
}

function drawRFID(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-18, -12, 14, 24, 4); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-11, -16, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555'; ctx.fillRect(2, 10, 24, 4); 
  ctx.fillRect(0, -10, 4, 20); 
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(6, 16, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, 16, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(6, -2, 12, 12, 1); ctx.fill();
  ctx.fillStyle = '#b0753a'; ctx.beginPath(); roundRect(8, -12, 10, 10, 1); ctx.fill();
  ctx.strokeStyle = '#ffcc99'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-11, -6); ctx.lineTo(4, -6); ctx.stroke();
  ctx.fillStyle = '#222'; ctx.fillRect(4, -8, 6, 8); 
  ctx.fillStyle = '#39ff14'; ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
  ctx.beginPath(); ctx.moveTo(10, -6); ctx.lineTo(24, -14); ctx.lineTo(24, 2); ctx.fill();
  ctx.globalAlpha = 1.0;
  ctx.restore();
}

// NUEVO: PACKING REDISEÑADO PARA QUE SE VEA COMO UNA PERSONA CLARA SOSTENIENDO LA CAJA
function drawPacker(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);

  // 1. Cuerpo (Chaleco mirando a la derecha)
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-16, -12, 16, 24, 4); ctx.fill();

  // 2. Cabeza y Casco
  ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(-8, 0, 7, 0, Math.PI*2); ctx.fill(); // Cara
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-8, 0, 7, Math.PI/2, Math.PI*1.5); ctx.fill(); // Mitad trasera casco
  ctx.fillRect(-8, -7, 10, 14); // Visera del casco
  ctx.fillStyle = '#e69900'; ctx.fillRect(-2, -5, 4, 10); // Relieve del casco

  // 3. Caja Gigante en frente
  ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(4, -14, 20, 28, 2); ctx.fill();
  ctx.fillStyle = '#b0753a'; ctx.fillRect(4, -14, 8, 28); // Sombra interna de la caja
  ctx.fillStyle = '#e5cca3'; ctx.fillRect(4, -2, 20, 4); // Cinta de embalaje

  // 4. Brazos sosteniendo la caja
  ctx.strokeStyle = '#ffcc99'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(10, -12); ctx.stroke(); // Brazo superior
  ctx.beginPath(); ctx.moveTo(-8, 10); ctx.lineTo(10, 12); ctx.stroke(); // Brazo inferior

  ctx.restore();
}

function drawMoto(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-16, 0, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24, 0, 8, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(-16, 0, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24, 0, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(8, 0); ctx.stroke();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-18, 4); ctx.lineTo(-4, 4); ctx.stroke();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-22, -14, 18, 14, 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(-22, -7, 18, 7);
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-4, -10, 14, 10, 3); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(4, -10, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222'; ctx.fillRect(6, -12, 4, 4);
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(26, -4, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
}

function drawSprite(role,cx,cy,col,rot) {
  if(role==='truck') drawTruck(cx,cy,col,rot);
  else if(role==='forklift') drawForklift(cx,cy,col,rot);
  else if(role==='rfid') drawRFID(cx,cy,col,rot);
  else if(role==='packer') drawPacker(cx,cy,col,rot);
  else if(role==='moto') drawMoto(cx,cy,col,rot);
}

/* ------- OBSTÁCULOS ------- */

function drawPallet(x,y) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(-16, -20, 18, 16, 2); ctx.fill();
  ctx.fillStyle = '#b0753a'; ctx.beginPath(); roundRect(-2, -16, 18, 12, 2); ctx.fill();
  ctx.fillStyle = '#e5cca3'; ctx.fillRect(-16, -14, 18, 4); ctx.fillRect(-2, -12, 18, 4); 
  ctx.fillStyle = '#fff'; ctx.fillRect(-12, -18, 6, 3); ctx.fillRect(4, -15, 6, 3); 
  ctx.fillStyle = '#8B5E3C'; ctx.fillRect(-20, -4, 40, 4); 
  ctx.fillStyle = '#5c3d26'; ctx.fillRect(-18, 0, 8, 5); ctx.fillRect(-4, 0, 8, 5); ctx.fillRect(10, 0, 8, 5);
  ctx.fillStyle = '#8B5E3C'; ctx.fillRect(-20, 5, 40, 4); 
  ctx.strokeStyle = 'rgba(57, 255, 20, 0.5)'; ctx.lineWidth = 1; ctx.strokeRect(-22, -22, 44, 32);
  ctx.restore();
}

function drawContainer(x,y) {
  ctx.save(); ctx.translate(x, y);
  var grd = ctx.createLinearGradient(-24, -16, 24, 16);
  grd.addColorStop(0, '#1a3a5c'); grd.addColorStop(1, '#0f243b');
  ctx.fillStyle = grd; ctx.beginPath(); roundRect(-26, -18, 52, 36, 2); ctx.fill();
  ctx.strokeStyle = '#0055aa'; ctx.lineWidth = 2;
  for(var i=-20; i<=20; i+=6) { ctx.beginPath(); ctx.moveTo(i, -16); ctx.lineTo(i, 16); ctx.stroke(); }
  ctx.fillStyle = '#ffaa00'; ctx.fillRect(-15, -6, 30, 12);
  ctx.fillStyle = '#111'; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('LOGISTIC', 0, 0);
  ctx.fillStyle = '#333';
  ctx.fillRect(-26, -18, 6, 6); ctx.fillRect(20, -18, 6, 6);
  ctx.fillRect(-26, 12, 6, 6); ctx.fillRect(20, 12, 6, 6);
  ctx.strokeStyle = 'rgba(0, 136, 255, 0.6)'; ctx.lineWidth = 1; ctx.strokeRect(-28, -20, 56, 40);
  ctx.restore();
}

/* ------- NUEVA PANTALLA DE RESULTADOS EXPECÍFICA POR JUGADOR ------- */

function drawPlayerResult(x, y, isWinner, player) {
   ctx.save(); ctx.translate(x, y);

   // Etiqueta Superior del Jugador
   ctx.fillStyle = player.color;
   ctx.font = 'bold 26px Courier New';
   ctx.textAlign = 'center';
   ctx.fillText(player.id, 0, -100);

   // Cabeza y Casco
   ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(0, -60, 16, 0, Math.PI*2); ctx.fill(); // Cara
   ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(0, -60, 16, Math.PI, Math.PI*2); ctx.fill(); // Casco
   ctx.fillRect(-16, -60, 32, 4); // Borde Casco

   // Torso (Chaleco identificador con el color exacto del jugador)
   ctx.fillStyle = player.color;
   ctx.beginPath(); roundRect(-22, -44, 44, 50, 6); ctx.fill();
   ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5;
   ctx.fillRect(-16, -20, 32, 6); // Cinta reflectante
   ctx.fillRect(-16, -5, 32, 6);
   ctx.globalAlpha = 1.0;

   if(isWinner) {
       // Expresión Feliz
       ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-6, -62, 2.5, 0, Math.PI*2); ctx.fill(); 
       ctx.beginPath(); ctx.arc(6, -62, 2.5, 0, Math.PI*2); ctx.fill();
       ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(0, -56, 7, 0, Math.PI); ctx.stroke(); 

       // Brazos arriba celebrando
       ctx.strokeStyle = player.color; ctx.lineWidth = 12; ctx.lineCap = 'round';
       ctx.beginPath(); ctx.moveTo(-20, -35); ctx.lineTo(-35, -70); ctx.stroke();
       ctx.beginPath(); ctx.moveTo(20, -35); ctx.lineTo(35, -70); ctx.stroke();

       // Caja Entregada en el centro inferior
       ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(-25, 20, 50, 40, 4); ctx.fill();
       ctx.fillStyle = '#e5cca3'; ctx.fillRect(-25, 35, 50, 8);
       ctx.fillStyle = '#39ff14'; ctx.beginPath(); ctx.arc(0, 40, 12, 0, Math.PI*2); ctx.fill();
       ctx.fillStyle = '#000'; ctx.font='bold 16px Courier New'; ctx.textAlign='center'; ctx.fillText('✔', 0, 45);

   } else {
       // Expresión de agotamiento / tristeza
       ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
       ctx.beginPath(); ctx.moveTo(-10, -64); ctx.lineTo(-4, -60); ctx.stroke(); // Cejas tristes
       ctx.beginPath(); ctx.moveTo(10, -64); ctx.lineTo(4, -60); ctx.stroke();
       ctx.fillRect(-7, -58, 4, 3); ctx.fillRect(3, -58, 4, 3); // Ojos cerrados
       ctx.beginPath(); ctx.arc(0, -48, 6, Math.PI, Math.PI*2); ctx.stroke(); // Boca

       // Brazos caídos
       ctx.strokeStyle = player.color; ctx.lineWidth = 12; ctx.lineCap = 'round';
       ctx.beginPath(); ctx.moveTo(-20, -30); ctx.lineTo(-20, 10); ctx.stroke();
       ctx.beginPath(); ctx.moveTo(20, -30); ctx.lineTo(20, 10); ctx.stroke();

       // Signo de fracaso
       ctx.fillStyle = '#ff4466'; ctx.font='bold 34px Courier New'; ctx.textAlign='center'; ctx.fillText('X', 0, 40);
   }
   ctx.restore();
}

function showWin(winner, loser) {
  ctx.fillStyle='rgba(10,14,26,0.95)'; ctx.fillRect(0,0,W,H);

  ctx.font='bold 36px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor = winner.color; ctx.shadowBlur = 20;
  ctx.fillStyle = winner.color; ctx.fillText('¡LA CARRERA HA TERMINADO!', W/2, 50);
  ctx.shadowBlur = 0;

  var panelW = 360, panelH = 360;
  var cxLeft = W/2 - panelW/2 - 20;
  var cxRight = W/2 + panelW/2 + 20;

  // PANEL GANADOR (Izquierda)
  ctx.fillStyle = 'rgba(57, 255, 20, 0.05)'; ctx.beginPath(); roundRect(cxLeft - panelW/2, 110, panelW, panelH, 8); ctx.fill();
  ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = winner.color; ctx.font = 'bold 24px Courier New';
  ctx.fillText('🏆 PRIMER LUGAR', cxLeft, 150);
  
  drawPlayerResult(cxLeft, 290, true, winner); // Muestra al jugador ganador
  
  ctx.fillStyle = '#fff'; ctx.font = '14px Courier New';
  ctx.fillText('¡Entregó el pedido a tiempo y triunfó!', cxLeft, 420);

  // PANEL PERDEDOR (Derecha)
  ctx.fillStyle = 'rgba(255, 68, 102, 0.05)'; ctx.beginPath(); roundRect(cxRight - panelW/2, 110, panelW, panelH, 8); ctx.fill();
  ctx.strokeStyle = '#ff4466'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = loser.color; ctx.font = 'bold 24px Courier New';
  ctx.fillText('SEGUNDO LUGAR', cxRight, 150);
  
  drawPlayerResult(cxRight, 290, false, loser); // Muestra al jugador perdedor
  
  ctx.fillStyle = '#fff'; ctx.font = '14px Courier New';
  ctx.fillText('Llegó tarde y perdió la entrega...', cxRight, 420);

  // Botón Reinicio
  ctx.font='bold 18px Courier New'; ctx.fillStyle='#ccc';
  ctx.fillText('Presiona R para iniciar la revancha', W/2, H - 40);
}

// --------------------------------------------
// MOTOR DEL JUEGO
// --------------------------------------------

function drawCustomer(cx,cy,anim) {
  var bob=Math.sin(anim*3)*2;
  ctx.save(); ctx.translate(cx,cy);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(0, 10, 14, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#44aaff'; ctx.beginPath(); roundRect(-10,-10+bob,20,18,6); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(0,-16+bob,8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#44aaff'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-8,-6+bob); ctx.lineTo(-16,0+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-6+bob); ctx.lineTo(16,0+bob); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 10px Courier New'; ctx.textAlign='center'; ctx.fillText('META',0,24);
  ctx.restore();
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function spawnObs(dt) {
  spawnT -= dt;
  if(spawnT <= 0) {
    
    // --- SENSOR JUGADOR 1 ---
    if(Math.random() > 0.15) { // 85% de que aparezca un obstáculo en este ciclo
      var targetY1;
      if (Math.random() > 0.3) { 
        // SENSOR ACTIVADO: 70% de probabilidad de aparecer en el carril exacto del P1
        targetY1 = p1.lanes[p1.li]; 
      } else {
        // 30% de probabilidad de ser aleatorio en cualquier carril
        targetY1 = P1_LANES[Math.floor(Math.random()*3)];
      }
      obs1.push({y: targetY1, x: W+60, t: Math.random()>0.5?'p':'c'});
    }
    
    // --- SENSOR JUGADOR 2 ---
    if(Math.random() > 0.15) { 
      var targetY2;
      if (Math.random() > 0.3) { 
        // SENSOR ACTIVADO: 70% de probabilidad de aparecer en el carril exacto del P2
        targetY2 = p2.lanes[p2.li]; 
      } else {
        targetY2 = P2_LANES[Math.floor(Math.random()*3)];
      }
      obs2.push({y: targetY2, x: W+60, t: Math.random()>0.5?'p':'c'});
    }
    
    // Reducimos el tiempo de espera para que aparezcan más seguido y la carrera sea intensa
    spawnT = 0.5 + Math.random() * 0.7; 
  }
}
function drawBg() {
  var s1=STAGES[p1.stage], s2=STAGES[p2.stage];
  ctx.fillStyle='#0A0E1A'; ctx.fillRect(0,0,W,H);
  var off1=p1.dist%80, off2=p2.dist%80;
  
  P1_LANES.forEach(function(ly){
    ctx.strokeStyle=s1.lc; ctx.lineWidth=2;
    for(var x=-off1;x<W;x+=80){
      ctx.beginPath(); ctx.moveTo(x,ly-28); ctx.lineTo(x+40,ly-28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,ly+28); ctx.lineTo(x+40,ly+28); ctx.stroke();
    }
  });
  P2_LANES.forEach(function(ly){
    ctx.strokeStyle=s2.lc; ctx.lineWidth=2;
    for(var x=-off2;x<W;x+=80){
      ctx.beginPath(); ctx.moveTo(x,ly-28); ctx.lineTo(x+40,ly-28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,ly+28); ctx.lineTo(x+40,ly+28); ctx.stroke();
    }
  });
  
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 5;
  ctx.strokeStyle='#ffffff66'; ctx.lineWidth=3; ctx.setLineDash([15,10]);
  ctx.beginPath(); ctx.moveTo(0,MID_Y); ctx.lineTo(W,MID_Y); ctx.stroke();
  ctx.setLineDash([]); ctx.shadowBlur = 0;
}

function drawStageBars() {
  var n=STAGES.length, bw=W/n;
  for(var i=0;i<n;i++) {
    var x=i*bw;
    ctx.fillStyle=i<p1.stage?STAGES[i].color:(i===p1.stage?STAGES[i].color+'55':'#1a1a1a');
    ctx.fillRect(x,0,bw-2,8);
    if(i===p1.stage){ var prog=(p1.dist%STAGE_DIST)/STAGE_DIST; ctx.fillStyle=STAGES[i].color; ctx.fillRect(x,0,(bw-2)*prog,8); }
    ctx.fillStyle=i<p2.stage?STAGES[i].color:(i===p2.stage?STAGES[i].color+'55':'#1a1a1a');
    ctx.fillRect(x,H-8,bw-2,8);
    if(i===p2.stage){ var prog2=(p2.dist%STAGE_DIST)/STAGE_DIST; ctx.fillStyle=STAGES[i].color; ctx.fillRect(x,H-8,(bw-2)*prog2,8); }
  }
}

function drawHUD() {
  ctx.font='bold 14px Courier New'; ctx.textBaseline='top';
  ctx.fillStyle='#00ffff'; ctx.textAlign='left';
  ctx.fillText('J1 ► '+STAGES[p1.stage].name.toUpperCase()+' ► '+Math.min(100,Math.floor(p1.dist/WIN_DIST*100))+'%', 15, 12);
  ctx.fillStyle='#ff6600'; ctx.textBaseline='bottom';
  ctx.fillText('J2 ► '+STAGES[p2.stage].name.toUpperCase()+' ► '+Math.min(100,Math.floor(p2.dist/WIN_DIST*100))+'%', 15, H-12);
  
  ctx.font='10px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
  STAGES.forEach(function(st,i){ ctx.fillStyle=st.color+'88'; ctx.fillText(st.name,(i+0.5)*W/STAGES.length,MID_Y-12); });
  
  var cx=W-60;
  [[P1_LANES[1],p1],[P2_LANES[1],p2]].forEach(function(pair){
    var ly=pair[0], pp=pair[1];
    var prog=Math.min(1,pp.dist/WIN_DIST);
    if(prog>0.82){ ctx.globalAlpha=(prog-0.82)/0.18; drawCustomer(cx,ly,custAnim); ctx.globalAlpha=1; }
  });
}

function drawPlayer(p) {
  var bob=p.speed>20?Math.sin(gT*18)*2.5:0;
  var dy=p.y+bob;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(p.x, p.y + 16, 24, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha=p.flash>0?0.4+Math.sin(gT*30)*0.4:1;
  drawSprite(p.role, p.x, dy, p.color, p.stunned?p.rot:0);
  ctx.globalAlpha=1;
  var st=STAGES[p.stage];
  ctx.fillStyle=st.color; ctx.font='bold 10px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(st.name.toUpperCase(), p.x, p.y-30); 
}

var lastT=null;
function loop(ts) {
  if(!running) return;
  if(!lastT) lastT=ts;
  var dt=Math.min((ts-lastT)/1000, 0.05);
  lastT=ts; gT+=dt; custAnim+=dt;

  if(keys['w']||keys['W']){ changeLane(p1,-1); keys['w']=false; keys['W']=false; }
  if(keys['s']||keys['S']){ changeLane(p1,1);  keys['s']=false; keys['S']=false; }
  if(keys['ArrowUp'])   { changeLane(p2,-1); keys['ArrowUp']=false; }
  if(keys['ArrowDown']) { changeLane(p2,1);  keys['ArrowDown']=false; }

  if(!winner) {
    updatePlayer(p1,dt); updatePlayer(p2,dt);
    spawnObs(dt);
    obs1=obs1.filter(function(o){ o.x-=p1.speed*dt; return o.x>-70; });
    obs2=obs2.filter(function(o){ o.x-=p2.speed*dt; return o.x>-70; });
    
    obs1.forEach(function(o,i){ if(Math.abs(o.x-p1.x)<35&&Math.abs(o.y-p1.y)<22){ crash(p1); obs1.splice(i,1); } });
    obs2.forEach(function(o,i){ if(Math.abs(o.x-p2.x)<35&&Math.abs(o.y-p2.y)<22){ crash(p2); obs2.splice(i,1); } });
    
    if(p1.dist>=WIN_DIST) winner=p1;
    else if(p2.dist>=WIN_DIST) winner=p2;
  }

  drawBg();
  obs1.forEach(function(o){ o.t==='p'?drawPallet(o.x,o.y):drawContainer(o.x,o.y); });
  obs2.forEach(function(o){ o.t==='p'?drawPallet(o.x,o.y):drawContainer(o.x,o.y); });
  drawPlayer(p1); drawPlayer(p2);
  
  updateDrawVFX(dt);
  drawStageBars(); drawHUD();
  
  if(winner) showWin(winner, winner === p1 ? p2 : p1);
  
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', function(e){
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if((e.key==='r'||e.key==='R') && winner) { startGame(); }
});
document.addEventListener('keyup', function(e){ keys[e.key]=false; });
</script>
