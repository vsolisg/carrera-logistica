<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚚</text></svg>">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
  width:100%; height:100vh; overflow:hidden; 
  background:#03050a; 
  display: flex; justify-content: center; align-items: center;
}
#game-wrapper {
  position: relative;
  width: 960px; height: 600px;
  box-shadow: 0 0 40px rgba(0, 255, 255, 0.15); 
  border: 1px solid #1a2b4c;
  border-radius: 12px;
  overflow: hidden;
}
canvas { display:block; background:#0A0E1A; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(10,14,26,0.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  font-family:'Courier New',monospace; color:#fff; z-index:10;
}
#overlay h1 { color:#00ffff; font-size:26px; text-align:center; text-shadow: 0 0 10px #00ffff; }
#overlay p { color:#ccc; font-size:13px; text-align:center; max-width:480px; line-height:1.7; }
.ctrl { display:flex; gap:20px; margin-top: 10px; }
.cbox { border:1px solid #333; padding:12px 24px; text-align:center; font-size:13px; border-radius: 6px; }
.c1 { color:#00ffff; border-color:#00ffff88; background: rgba(0,255,255,0.05); }
.c2 { color:#ff6600; border-color:#ff660088; background: rgba(255,102,0,0.05); }
#startBtn {
  margin-top:15px; padding:12px 36px; background:transparent;
  border:2px solid #00ffff; color:#00ffff; border-radius: 4px;
  font-family:'Courier New',monospace; font-size:16px; font-weight: bold;
  cursor:pointer; transition:all 0.2s;
}
#startBtn:hover { background:#00ffff; color:#0A0E1A; box-shadow: 0 0 15px #00ffff; }
.stages-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin: 10px 0; }
.spill { font-size:11px; border:1px solid #444; padding:5px 10px; color:#aaa; border-radius: 4px; background: #111; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="c" width="960" height="600"></canvas>
  <div id="overlay">
    <h1>🏁 CD RACING 🏁</h1>
    <p>Completa las 5 etapas del centro de distribución. Evita pallets y contenedores. ¡El primero en terminar optimizará el Fill Rate y hará al cliente feliz!</p>
    <div class="stages-row">
      <div class="spill">📦 Recepción</div>
      <div class="spill">🏭 Almacenamiento</div>
      <div class="spill">📡 Picking</div>
      <div class="spill">📫 Packing</div>
      <div class="spill">🚚 Última Milla</div>
    </div>
    <div class="ctrl">
      <div class="cbox c1"><b>JUGADOR 1</b><br><br>W / S</div>
      <div class="cbox c2"><b>JUGADOR 2</b><br><br>↑ / ↓</div>
    </div>
    <button id="startBtn">INICIAR TURNO</button>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 960, H = 600;

var STAGES = [
  {name:'Recepción',    color:'#00ffff', lc:'#00ffff33', role:'truck'},
  {name:'Almacenamiento',color:'#ff00ff', lc:'#ff00ff33', role:'forklift'},
  {name:'Picking', color:'#39ff14', lc:'#39ff1433', role:'picker'},
  {name:'Packing',      color:'#ffaa00', lc:'#ffaa0033', role:'packer'},
  {name:'Última Milla', color:'#ff4466', lc:'#ff446633', role:'moto'},
];
var STAGE_DIST = 4000;
var WIN_DIST = STAGE_DIST * STAGES.length;
var P1_LANES = [80, 170, 260];
var P2_LANES = [350, 440, 530];
var MID_Y = 310;

var keys = {};
var p1, p2, obs1, obs2, spawnT, winner, gT, custAnim, running;
var particles = [], banners = [];

document.getElementById('startBtn').addEventListener('click', function() {
  document.getElementById('overlay').style.display = 'none';
  startGame();
});

function startGame() {
  p1 = makePlayer('JUGADOR 1','#00ffff', P1_LANES, 130);
  p2 = makePlayer('JUGADOR 2','#ff6600', P2_LANES, 130);
  obs1=[]; obs2=[]; particles=[]; banners=[]; 
  spawnT=1.2; winner=null; gT=0; custAnim=0; running=true;
  requestAnimationFrame(loop);
}

function makePlayer(id, color, lanes, x) {
  return {
    id:id, color:color, lanes:lanes, x:x,
    li:1, y:lanes[1], ty:lanes[1],
    dist:0, speed:460, maxSpeed:460, accel:260,
    stunned:false, stunT:0, rot:0, flash:0,
    lastStage: 0,
    get stage(){ return Math.min(Math.floor(this.dist/STAGE_DIST), STAGES.length-1); },
    get role(){ return STAGES[this.stage].role; }
  };
}

function changeLane(p, d) {
  if (!p.stunned) { p.li = Math.max(0, Math.min(2, p.li+d)); p.ty = p.lanes[p.li]; }
}

function crash(p) {
  if (!p.stunned) { p.stunned=true; p.stunT=1.4; p.speed=60; p.rot=0; p.flash=1; }
}

function spawnStageVFX(x, y, stageDef, laneY) {
  for(var i=0; i<40; i++) {
    particles.push({
      x: x, y: y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
      life: 1.0, color: stageDef.color
    });
  }
  banners.push({ text: "¡" + stageDef.name.toUpperCase() + "!", y: laneY, color: stageDef.color, life: 2.5, scale: 0.1 });
}

function updateDrawVFX(dt) {
  for(var i=particles.length-1; i>=0; i--) {
    var pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.life -= dt * 1.5;
    if(pt.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, 6, 6);
  }
  ctx.globalAlpha = 1;

  for(var j=banners.length-1; j>=0; j--) {
    var b = banners[j];
    b.life -= dt;
    if(b.life <= 0) { banners.splice(j, 1); continue; }
    b.scale = Math.min(1.2, b.scale + dt * 8); 
    if(b.scale > 1.0 && b.life < 2.3) b.scale = 1.0; 
    ctx.save(); ctx.translate(W/2, b.y); ctx.scale(b.scale, b.scale);
    ctx.globalAlpha = Math.min(1, b.life * 2); 
    ctx.fillStyle = b.color; ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = b.color; ctx.shadowBlur = 20;
    ctx.fillText(b.text, 0, 0); ctx.restore();
  }
}

function updatePlayer(p, dt) {
  p.dist += p.speed * dt;
  var currentStage = p.stage;
  if (currentStage !== p.lastStage && currentStage < STAGES.length) {
    spawnStageVFX(p.x, p.y, STAGES[currentStage], p.lanes[1]);
    p.lastStage = currentStage;
  }
  if (p.stunned) {
    p.stunT -= dt; p.rot += 260*dt;
    if (p.stunT <= 0) { p.stunned=false; p.rot=0; }
  } else {
    if (p.speed < p.maxSpeed) { p.speed += p.accel*dt; if (p.speed>p.maxSpeed) p.speed=p.maxSpeed; }
  }
  p.y += (p.ty - p.y) * 12 * dt;
  p.flash = Math.max(0, p.flash - dt*3);
}

/* ------- SPRITES ------- */

function drawWheel(x, y) {
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
}

function drawTruck(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); roundRect(-34, -10, 68, 20, 4); ctx.fill();
  var grd = ctx.createLinearGradient(-36, 0, 10, 0);
  grd.addColorStop(0, '#222'); grd.addColorStop(1, col);
  ctx.fillStyle = grd; ctx.beginPath(); roundRect(-36, -15, 52, 28, 4); ctx.fill();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(18, -13, 20, 24, 4); ctx.fill();
  ctx.fillStyle = '#8ce'; ctx.beginPath(); roundRect(24, -10, 10, 18, 2); ctx.fill(); 
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 5;
  ctx.fillRect(36, -11, 2, 4); ctx.fillRect(36, 5, 2, 4); ctx.shadowBlur = 0;
  drawWheel(-24, -16); drawWheel(-24, 14); drawWheel(-8, -16);  drawWheel(-8, 14); drawWheel(26, -16);  drawWheel(26, 14);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-10, 13); ctx.stroke();
  ctx.restore();
}

function drawForklift(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  drawWheel(-16, 12); drawWheel(10, 12);
  ctx.fillStyle = '#333'; ctx.beginPath(); roundRect(-24, -10, 12, 20, 3); ctx.fill();
  var grd = ctx.createLinearGradient(-12, -10, 14, 10);
  grd.addColorStop(0, col); grd.addColorStop(1, '#ffaa00');
  ctx.fillStyle = grd; ctx.beginPath(); roundRect(-14, -8, 28, 18, 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-10, -8); ctx.lineTo(-12, -26); ctx.lineTo(6, -26); ctx.lineTo(10, -8); ctx.stroke();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-6, -18, 10, 12, 2); ctx.fill(); 
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-1, -22, 5, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#444'; ctx.fillRect(14, -24, 4, 36);
  ctx.fillStyle = '#999'; ctx.fillRect(18, 10, 16, 3);
  ctx.restore();
}

function drawPicker(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-18, -12, 14, 24, 4); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-11, -16, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555'; ctx.fillRect(2, 10, 24, 4); 
  ctx.fillRect(0, -10, 4, 20); 
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(6, 16, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, 16, 4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPacker(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-16, -12, 16, 24, 4); ctx.fill();
  ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(-8, 0, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-8, 0, 7, Math.PI/2, Math.PI*1.5); ctx.fill();
  ctx.fillRect(-8, -7, 10, 14);
  ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(4, -14, 20, 28, 2); ctx.fill();
  ctx.restore();
}

function drawMoto(cx, cy, col, rot) {
  ctx.save(); ctx.translate(cx, cy); if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-16, 0, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24, 0, 8, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(-16, 0, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24, 0, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(8, 0); ctx.stroke();
  ctx.fillStyle = col; ctx.beginPath(); roundRect(-22, -14, 18, 14, 2); ctx.fill();
  ctx.restore();
}

function drawSprite(role,cx,cy,col,rot) {
  if(role==='truck') drawTruck(cx,cy,col,rot);
  else if(role==='forklift') drawForklift(cx,cy,col,rot);
  else if(role==='picker') drawPicker(cx,cy,col,rot);
  else if(role==='packer') drawPacker(cx,cy,col,rot);
  else if(role==='moto') drawMoto(cx,cy,col,rot);
}

/* ------- OBSTÁCULOS ------- */

function drawPallet(x,y) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#c98a4b'; ctx.beginPath(); roundRect(-16, -20, 18, 16, 2); ctx.fill();
  ctx.restore();
}

function drawContainer(x,y) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#1a3a5c'; ctx.beginPath(); roundRect(-26, -18, 52, 36, 2); ctx.fill();
  ctx.restore();
}

/* ------- PANTALLA RESULTADOS ------- */

function drawPlayerResult(x, y, isWinner, player) {
   ctx.save(); ctx.translate(x, y);
   ctx.fillStyle = player.color;
   ctx.font = 'bold 26px Courier New';
   ctx.textAlign = 'center';
   ctx.fillText(player.id, 0, -100);
   ctx.restore();
}

function showWin(winner, loser) {
  ctx.fillStyle='rgba(10,14,26,0.95)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=winner.color; ctx.font='bold 36px Courier New'; ctx.textAlign='center';
  ctx.fillText('¡LA CARRERA HA TERMINADO!', W/2, 100);
  ctx.font='bold 24px Courier New';
  ctx.fillText('GANADOR: ' + winner.id, W/2, 250);
}

function loop(ts) {
  if(!running) return;
  if(!lastT) lastT=ts;
  var dt=Math.min((ts-lastT)/1000, 0.05);
  lastT=ts; gT+=dt; custAnim+=dt;

  if(keys['w']||keys['W']){ changeLane(p1,-1); keys['w']=false; keys['W']=false; }
  if(keys['s']||keys['S']){ changeLane(p1,1);  keys['s']=false; keys['S']=false; }
  if(keys['ArrowUp'])   { changeLane(p2,-1); keys['ArrowUp']=false; }
  if(keys['ArrowDown']) { changeLane(p2,1);  keys['ArrowDown']=false; }

  if(!winner) {
    updatePlayer(p1,dt); updatePlayer(p2,dt);
    spawnObs(dt);
    obs1=obs1.filter(function(o){ o.x-=p1.speed*dt; return o.x>-70; });
    obs2=obs2.filter(function(o){ o.x-=p2.speed*dt; return o.x>-70; });
    obs1.forEach(function(o,i){ if(Math.abs(o.x-p1.x)<35&&Math.abs(o.y-p1.y)<22){ crash(p1); obs1.splice(i,1); } });
    obs2.forEach(function(o,i){ if(Math.abs(o.x-p2.x)<35&&Math.abs(o.y-p2.y)<22){ crash(p2); obs2.splice(i,1); } });
    if(p1.dist>=WIN_DIST) winner=p1;
    else if(p2.dist>=WIN_DIST) winner=p2;
  }
  drawBg();
  obs1.forEach(function(o){ o.t==='p'?drawPallet(o.x,o.y):drawContainer(o.x,o.y); });
  obs2.forEach(function(o){ o.t==='p'?drawPallet(o.x,o.y):drawContainer(o.x,o.y); });
  drawPlayer(p1); drawPlayer(p2);
  updateDrawVFX(dt);
  drawStageBars(); drawHUD();
  if(winner) showWin(winner, winner === p1 ? p2 : p1);
  requestAnimationFrame(loop);
}

function drawBg() {
  var s1=STAGES[p1.stage], s2=STAGES[p2.stage];
  ctx.fillStyle='#0A0E1A'; ctx.fillRect(0,0,W,H);
  var off1=p1.dist%80, off2=p2.dist%80;
  P1_LANES.forEach(function(ly){ ctx.strokeStyle=s1.lc; ctx.lineWidth=2; for(var x=-off1;x<W;x+=80){ ctx.beginPath(); ctx.moveTo(x,ly-28); ctx.lineTo(x+40,ly-28); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,ly+28); ctx.lineTo(x+40,ly+28); ctx.stroke(); } });
  P2_LANES.forEach(function(ly){ ctx.strokeStyle=s2.lc; ctx.lineWidth=2; for(var x=-off2;x<W;x+=80){ ctx.beginPath(); ctx.moveTo(x,ly-28); ctx.lineTo(x+40,ly-28); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,ly+28); ctx.lineTo(x+40,ly+28); ctx.stroke(); } });
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 5; ctx.strokeStyle='#ffffff66'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,MID_Y); ctx.lineTo(W,MID_Y); ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur = 0;
}

function drawStageBars() {
  var n=STAGES.length, bw=W/n;
  for(var i=0;i<n;i++) {
    var x=i*bw; ctx.fillStyle=i<p1.stage?STAGES[i].color:(i===p1.stage?STAGES[i].color+'55':'#1a1a1a'); ctx.fillRect(x,0,bw-2,8);
    if(i===p1.stage){ var prog=(p1.dist%STAGE_DIST)/STAGE_DIST; ctx.fillStyle=STAGES[i].color; ctx.fillRect(x,0,(bw-2)*prog,8); }
    ctx.fillStyle=i<p2.stage?STAGES[i].color:(i===p2.stage?STAGES[i].color+'55':'#1a1a1a'); ctx.fillRect(x,H-8,bw-2,8);
    if(i===p2.stage){ var prog2=(p2.dist%STAGE_DIST)/STAGE_DIST; ctx.fillStyle=STAGES[i].color; ctx.fillRect(x,H-8,(bw-2)*prog2,8); }
  }
}

function drawHUD() {
  ctx.font='bold 14px Courier New'; ctx.textBaseline='top'; ctx.fillStyle='#00ffff'; ctx.textAlign='left'; ctx.fillText('J1 ► '+STAGES[p1.stage].name.toUpperCase()+' ► '+Math.min(100,Math.floor(p1.dist/WIN_DIST*100))+'%', 15, 12);
  ctx.fillStyle='#ff6600'; ctx.textBaseline='bottom'; ctx.fillText('J2 ► '+STAGES[p2.stage].name.toUpperCase()+' ► '+Math.min(100,Math.floor(p2.dist/WIN_DIST*100))+'%', 15, H-12);
}

function drawPlayer(p) {
  var bob=p.speed>20?Math.sin(gT*18)*2.5:0;
  ctx.globalAlpha=p.flash>0?0.4+Math.sin(gT*30)*0.4:1;
  drawSprite(p.role, p.x, p.y+bob, p.color, p.stunned?p.rot:0);
  ctx.globalAlpha=1;
  ctx.fillStyle=STAGES[p.stage].color; ctx.font='bold 10px Courier New'; ctx.textAlign='center'; ctx.fillText(STAGES[p.stage].name.toUpperCase(), p.x, p.y-30); 
}

function spawnObs(dt) {
  spawnT -= dt;
  if(spawnT <= 0) {
    var targetY1 = Math.random() > 0.3 ? p1.lanes[p1.li] : P1_LANES[Math.floor(Math.random()*3)];
    var targetY2 = Math.random() > 0.3 ? p2.lanes[p2.li] : P2_LANES[Math.floor(Math.random()*3)];
    obs1.push({y: targetY1, x: W+60, t: Math.random()>0.5?'p':'c'});
    obs2.push({y: targetY2, x: W+60, t: Math.random()>0.5?'p':'c'});
    spawnT = 0.5 + Math.random() * 0.7; 
  }
}

document.addEventListener('keydown', function(e){ keys[e.key]=true; if((e.key==='r'||e.key==='R') && winner) { startGame(); } });
document.addEventListener('keyup', function(e){ keys[e.key]=false; });
</script>
</body>
</html>
